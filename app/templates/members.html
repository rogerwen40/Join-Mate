<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }}｜JoinMate</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">JoinMate</a>
      <nav class="topnav"><span class="signed-in-name">{{ current_user.name }}</span><a href="/me">我的紀錄</a><a href="/notifications">通知</a><a class="quiet-link" href="/">返回活動列表</a></nav>
    </header>

    <main class="form-shell">
      <section class="page-heading compact">
        <p class="eyebrow">MEMBERS</p>
        <h1>使用者列表</h1>
        <p>任何朋友或社群使用者都能自行建立帳號並參加活動。</p>
      </section>

      <section class="member-section">
        <div class="section-heading"><h2>已註冊帳號</h2><span>{{ members|length }} 人</span></div>
        {% if members %}
          <div class="member-list">
            {% for member in members %}
              <div class="member-item">
                <span class="avatar">{{ member.name[0] }}</span>
                <div><strong>{{ member.name }}</strong><small>{{ member.email }}</small></div>
              </div>
            {% endfor %}
          </div>
        {% else %}
          <div class="empty-state compact-empty">尚未有人建立帳號。</div>
        {% endif %}
      </section>
    </main>
  </body>
</html>
