services:
  - type: web
    name: joinmate
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: joinmate-db
          property: connectionString
      - key: JOINMATE_SESSION_SECRET
        generateValue: true
      - key: JOINMATE_HTTPS_ONLY
        value: "1"

databases:
  - name: joinmate-db
    region: singapore
    plan: free
    databaseName: joinmate
    ipAllowList: []
